spring.application.name=online_courier

# Server
server.port=8080

# Datasource - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ocms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT settings
app.jwt.secret=change-this-demo-secret-please-change
app.jwt.expiration-minutes=120

# CORS (adjust origins as needed for local static frontend)
spring.web.cors.allowed-origins=http://localhost:8080,http://127.0.0.1:8080
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Authorization,Content-Type
spring.web.cors.allow-credentials=true

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
