spring.application.name=online_courier
spring.main.lazy-initialization=true
spring.jmx.enabled=false
spring.main.banner-mode=off

# Server Configuration (Render dynamically assigns PORT)
server.port=${PORT:8080}

# Database Configuration (Neon PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-raspy-brook-a11jbevv-pooler.ap-southeast-1.aws.neon.tech:5432/neondb?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:npg_RzCdBeQhc31W}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool carefully restricted for 512MB RAM bounds
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=300000

# JPA / Hibernate for PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate optimization for limited resources
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# JWT settings (Use ENV variables in production)
app.jwt.secret=${JWT_SECRET:change-this-demo-secret-please-change-to-something-secure-for-production}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}

# CORS Configuration (Vercel Frontend URL)
spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:5500}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Authorization,Content-Type
spring.web.cors.allow-credentials=true

# Logging
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
