<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - OCMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚚</text></svg>"/>
  </head>
<body>
    <header class="header" id="topnav"></header>
    
    <main class="container">
        <div class="card" style="max-width: 500px; margin: 60px auto;">
            <h2>Sign Up - New User</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">
                Create an account to start sending couriers
            </p>
            
            <div id="message" class="alert hidden"></div>
            
            <form id="signupForm" class="form-grid">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required maxlength="30" pattern="[a-zA-Z0-9_]+" title="Username can only contain letters, numbers, and underscores">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>
                
                <button type="submit" class="btn">Create Account</button>
            </form>

            <p style="margin-top: 20px; text-align: center; color: var(--text-muted); font-size: 14px;">
                Already have an account? <a href="login.html" style="color: var(--primary);">Login here</a>
            </p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/menu.js"></script>
    <script>
        const form = document.getElementById('signupForm');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            message.className = 'alert hidden';

            const name = document.getElementById('name').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate passwords match
            if (password !== confirmPassword) {
                message.textContent = 'Passwords do not match';
                message.className = 'alert error';
                return;
            }

            // Validate password length
            if (password.length < 6) {
                message.textContent = 'Password must be at least 6 characters';
                message.className = 'alert error';
                return;
            }

            try {
                await window.ocmsAPI.api('/auth/register', {
                    method: 'POST',
                    body: { name, username, email, password }
                });

                message.textContent = 'Account created successfully! Redirecting to login...';
                message.className = 'alert success';
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                message.textContent = error.message || 'Registration failed';
                message.className = 'alert error';
            }
        });
    </script>
</body>
</html>
