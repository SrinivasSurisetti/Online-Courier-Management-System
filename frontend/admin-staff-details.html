<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Details - OCMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚚</text></svg>"/>
  </head>
<body>
    <header class="header" id="topnav"></header>
    
    <main class="container">
        <div class="card">
            <h2>All Staff</h2>
            <div id="loading" class="loading">Loading...</div>
            <div id="staffList" class="hidden"></div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/menu.js"></script>
    <script>
        

        if (!window.ocmsAPI.isAuthenticated()) {
            window.location.href = 'login.html';
        }

        async function loadStaff() {
            try {
                const staff = await window.ocmsAPI.api('/admin/staff');
                const loading = document.getElementById('loading');
                const list = document.getElementById('staffList');

                loading.classList.add('hidden');
                list.classList.remove('hidden');

                if (!staff || staff.length === 0) {
                    list.innerHTML = '<p style="text-align:center;color:var(--text-muted);">No staff found.</p>';
                    return;
                }

                list.innerHTML = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>City</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${staff.map(s => `
                                <tr>
                                    <td><strong>${s.name}</strong></td>
                                    <td>${s.email}</td>
                                    <td>${s.city}</td>
                                    <td><span class="badge ${s.status === 'ACTIVE' ? 'green' : 'gray'}">${s.status}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                document.getElementById('loading').innerHTML = `<p class="alert error">${error.message}</p>`;
            }
        }

        loadStaff();
    </script>
</body>
</html>
