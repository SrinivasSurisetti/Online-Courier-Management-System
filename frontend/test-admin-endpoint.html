<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Admin Endpoint</title>
</head>
<body>
    <h1>Admin Endpoint Test</h1>
    <div id="result"></div>
    
    <script>
        async function testEndpoint() {
            try {
                // First, let's test if the server is running
                const response = await fetch('http://localhost:8080/api/admin/couriers', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                if (response.status === 401) {
                    document.getElementById('result').innerHTML = '<p style="color: orange;">Endpoint is working but requires authentication (401 Unauthorized)</p>';
                } else if (response.status === 403) {
                    document.getElementById('result').innerHTML = '<p style="color: orange;">Endpoint is working but access denied (403 Forbidden)</p>';
                } else if (response.ok) {
                    const data = await response.json();
                    document.getElementById('result').innerHTML = '<p style="color: green;">Endpoint is working! Data received: ' + JSON.stringify(data) + '</p>';
                } else {
                    document.getElementById('result').innerHTML = '<p style="color: red;">Endpoint returned status: ' + response.status + '</p>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
            }
        }
        
        testEndpoint();
    </script>
</body>
</html>
